<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGS Board Game Companion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- SCANLINE OVERLAY -->
    <div class="scanlines"></div>

    <!-- BOOT SCREEN -->
    <div id="boot-screen" class="screen active">
        <div class="boot-content">
            <div class="boot-logo">
                <div class="codec-frame">
                    <div class="codec-corner tl"></div>
                    <div class="codec-corner tr"></div>
                    <div class="codec-corner bl"></div>
                    <div class="codec-corner br"></div>
                    <div class="boot-inner">
                        <div class="boot-text-glitch" data-text="MGS">MGS</div>
                        <div class="boot-subtitle">BOARD GAME COMPANION</div>
                        <div class="boot-line"></div>
                        <div class="boot-desc">SHADOW MOSES ISLAND</div>
                        <div class="boot-desc-small">TACTICAL ESPIONAGE OPERATION</div>
                    </div>
                </div>
            </div>
            <button class="btn-codec btn-start" onclick="App.showScreen('stage-select')">
                <span class="btn-inner">▶ INIZIA MISSIONE</span>
            </button>
            <div class="boot-footer">
                <span class="blink">●</span> PREMI PER CONTINUARE
            </div>
        </div>
    </div>

    <!-- STAGE SELECT SCREEN -->
    <div id="stage-select" class="screen">
        <div class="screen-header">
            <div class="header-left">
                <span class="header-icon">◆</span>
                <span class="header-title">MISSION SELECT</span>
            </div>
            <div class="header-right">
                <span class="header-freq">140.85</span>
            </div>
        </div>
        <div class="stage-grid" id="stage-grid">
            <!-- Stages generated by JS -->
        </div>
        <div class="screen-footer">
            <div class="footer-hint">SELEZIONA UNO STAGE PER INIZIARE</div>
        </div>
    </div>

    <!-- STAGE ACTIVE SCREEN (Video Player + Soundboard) -->
    <div id="stage-active" class="screen">
        <div class="screen-header">
            <button class="btn-back" onclick="App.showScreen('stage-select')">
                ◄ MISSIONI
            </button>
            <div class="header-left">
                <span class="header-icon">◆</span>
                <span class="header-title" id="active-stage-title">STAGE 01</span>
            </div>
            <div class="header-right">
                <span class="stage-status" id="stage-status">BRIEFING</span>
            </div>
        </div>

        <!-- Video Section -->
        <div class="video-section" id="video-section">
            <div class="video-wrapper" id="video-wrapper">
                <div class="video-placeholder" id="video-placeholder">
                    <div class="placeholder-icon">▶</div>
                    <div class="placeholder-text">NESSUN VIDEO CONFIGURATO</div>
                </div>
                <div id="youtube-player"></div>
            </div>
            <div class="video-controls">
                <button class="btn-codec btn-video" id="btn-intro" onclick="App.playIntro()">
                    <span class="btn-inner">▶ INTRO</span>
                </button>
                <button class="btn-codec btn-video" id="btn-outro" onclick="App.playOutro()">
                    <span class="btn-inner">▶ OUTRO</span>
                </button>
                <button class="btn-codec btn-video btn-stop" id="btn-stop-video" onclick="App.stopVideo()" style="display:none">
                    <span class="btn-inner">■ STOP</span>
                </button>
            </div>
        </div>

        <!-- Soundboard Section -->
        <div class="soundboard-section">
            <div class="section-title">
                <span class="section-icon">♫</span> SOUNDBOARD
            </div>

            <!-- Background Music -->
            <div class="sound-category">
                <div class="category-title">MUSICA DI SOTTOFONDO</div>
                <div class="sound-buttons" id="music-buttons">
                    <!-- Generated by JS -->
                </div>
                <div class="music-controls" id="music-controls" style="display:none">
                    <input type="range" id="music-volume" class="volume-slider" min="0" max="100" value="50" oninput="App.setMusicVolume(this.value)">
                    <button class="btn-codec btn-small" onclick="App.stopMusic()">
                        <span class="btn-inner">■ STOP</span>
                    </button>
                </div>
            </div>

            <!-- Sound Effects -->
            <div class="sound-category">
                <div class="category-title">EFFETTI SONORI</div>
                <div class="sound-buttons" id="sfx-buttons">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Ambient Sounds -->
            <div class="sound-category">
                <div class="category-title">SUONI AMBIENTALI</div>
                <div class="sound-buttons" id="ambient-buttons">
                    <!-- Generated by JS -->
                </div>
                <div class="music-controls" id="ambient-controls" style="display:none">
                    <input type="range" id="ambient-volume" class="volume-slider" min="0" max="100" value="30" oninput="App.setAmbientVolume(this.value)">
                    <button class="btn-codec btn-small" onclick="App.stopAmbient()">
                        <span class="btn-inner">■ STOP</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUDIO ELEMENTS (created dynamically by JS) -->

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
