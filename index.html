<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGS Board Game Companion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- SCANLINE OVERLAY -->
    <div class="scanlines"></div>

    <!-- PRESS START SCREEN -->
    <div id="press-start-screen" class="screen active">
        <div class="press-start-content" onclick="App.startIntroVideo()">
            <img src="img/splash.png" class="splash-img" alt="Metal Gear Solid - The Board Game">
            <div class="press-start-blink">
                <span class="blink">●</span> PRESS START
            </div>
        </div>
    </div>

    <!-- INTRO VIDEO SCREEN (skippable) -->
    <div id="intro-screen" class="screen">
        <div class="intro-video-container">
            <video id="intro-video" playsinline>
                <source src="video/intro.mp4" type="video/mp4">
            </video>
            <button class="skip-btn" onclick="App.skipIntro()">SKIP ▶▶</button>
        </div>
    </div>

    <!-- MAIN MENU SCREEN (PS1 style) -->
    <div id="main-menu" class="screen">
        <div class="menu-bg">
            <!-- Dark animated circuit background -->
            <div class="menu-circuit-bg"></div>

            <!-- Splash image appears from center -->
            <div class="menu-splash" id="menu-splash">
                <img src="img/splash.png" alt="Metal Gear Solid - The Board Game">
            </div>

            <!-- Menu wheel (appears after splash) -->
            <div class="menu-wheel" id="menu-wheel">
                <div class="menu-item prev" id="menu-prev"></div>
                <div class="menu-item current" id="menu-current">
                    <span class="menu-label" id="menu-label"></span>
                </div>
                <div class="menu-item next" id="menu-next"></div>
            </div>
        </div>
    </div>

    <!-- BRIEFING SCREEN -->
    <div id="briefing-screen" class="screen">
        <div class="screen-header">
            <button class="btn-back" onclick="App.playMenuReturn(); App.stopBriefing(); App.showScreen('main-menu')">
                ◄ MENU
            </button>
            <div class="header-left">
                <span class="header-icon">◆</span>
                <span class="header-title">BRIEFING</span>
            </div>
        </div>
        <div class="briefing-video-container">
            <video id="briefing-video" controls></video>
        </div>
    </div>

    <!-- VR TRAINING SCREEN (placeholder) -->
    <div id="vr-screen" class="screen">
        <div class="screen-header">
            <button class="btn-back" onclick="App.playMenuReturn(); App.showScreen('main-menu')">
                ◄ MENU
            </button>
            <div class="header-left">
                <span class="header-icon">◆</span>
                <span class="header-title">VR TRAINING</span>
            </div>
        </div>
        <div class="placeholder-screen">
            <div class="placeholder-icon">◆</div>
            <div class="placeholder-text">IN COSTRUZIONE</div>
            <div class="placeholder-sub">Le missioni VR saranno disponibili prossimamente</div>
        </div>
    </div>

    <!-- STAGE SELECT SCREEN (LOAD GAME) -->
    <div id="stage-select" class="screen">
        <div class="screen-header">
            <button class="btn-back" onclick="App.playMenuReturn(); App.showScreen('main-menu')">
                ◄ MENU
            </button>
            <div class="header-left">
                <span class="header-icon">◆</span>
                <span class="header-title">MISSION SELECT</span>
            </div>
            <div class="header-right">
                <span class="header-freq">140.85</span>
            </div>
        </div>
        <div class="stage-grid" id="stage-grid">
            <!-- Stages generated by JS -->
        </div>
        <div class="screen-footer">
            <div class="footer-hint">SELEZIONA UNO STAGE PER INIZIARE</div>
        </div>
    </div>

    <!-- STAGE ACTIVE SCREEN (Video Player + Soundboard) -->
    <div id="stage-active" class="screen">
        <div class="screen-header">
            <button class="btn-back" onclick="App.stopAllAudio(); App.showScreen('stage-select')">
                ◄ MISSIONI
            </button>
            <div class="header-left">
                <span class="header-icon">◆</span>
                <span class="header-title" id="active-stage-title">STAGE 01</span>
            </div>
            <div class="header-right">
                <span class="stage-status" id="stage-status">BRIEFING</span>
            </div>
        </div>

        <!-- Video Section -->
        <div class="video-section" id="video-section">
            <div class="video-wrapper" id="video-wrapper">
                <div class="video-placeholder" id="video-placeholder">
                    <div class="placeholder-icon">▶</div>
                    <div class="placeholder-text">SELEZIONA INTRO O OUTRO</div>
                </div>
                <video id="video-player" controls style="display:none"></video>
            </div>
            <div class="video-controls">
                <button class="btn-codec btn-video" id="btn-intro" onclick="App.playIntro()">
                    <span class="btn-inner">▶ INTRO</span>
                </button>
                <button class="btn-codec btn-video" id="btn-outro" onclick="App.playOutro()">
                    <span class="btn-inner">▶ OUTRO</span>
                </button>
                <button class="btn-codec btn-video btn-stop" id="btn-stop-video" onclick="App.stopVideo()" style="display:none">
                    <span class="btn-inner">■ STOP</span>
                </button>
            </div>
        </div>

        <!-- Soundboard Section -->
        <div class="soundboard-section">
            <div class="section-title">
                <span class="section-icon">♫</span> SOUNDBOARD
            </div>

            <!-- Background Music -->
            <div class="sound-category">
                <div class="category-title">MUSICA DI SOTTOFONDO</div>
                <div class="sound-buttons" id="music-buttons">
                    <!-- Generated by JS -->
                </div>
                <div class="music-controls" id="music-controls" style="display:none">
                    <input type="range" id="music-volume" class="volume-slider" min="0" max="100" value="50" oninput="App.setMusicVolume(this.value)">
                    <button class="btn-codec btn-small" onclick="App.stopMusic()">
                        <span class="btn-inner">■ STOP</span>
                    </button>
                </div>
            </div>

            <!-- Alert System -->
            <div class="sound-category">
                <div class="category-title">ALERT</div>
                <div class="sound-buttons" id="alert-section">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Sound Effects -->
            <div class="sound-category">
                <div class="category-title">EFFETTI SONORI</div>
                <div class="sound-buttons" id="sfx-buttons">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Ambient Sounds -->
            <div class="sound-category">
                <div class="category-title">SUONI AMBIENTALI</div>
                <div class="sound-buttons" id="ambient-buttons">
                    <!-- Generated by JS -->
                </div>
                <div class="music-controls" id="ambient-controls" style="display:none">
                    <input type="range" id="ambient-volume" class="volume-slider" min="0" max="100" value="30" oninput="App.setAmbientVolume(this.value)">
                    <button class="btn-codec btn-small" onclick="App.stopAmbient()">
                        <span class="btn-inner">■ STOP</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUDIO ELEMENTS (created dynamically by JS) -->

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
